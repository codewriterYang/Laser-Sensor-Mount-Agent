<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激光传感器装配指导系统</title>
<style>
:root {
  --bg: #f5f7fa; --card: #fff; --primary: #2563eb; --danger: #dc2626;
  --success: #16a34a; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 960px; margin: 0 auto; padding: 20px; }
h1 { font-size: 1.5rem; margin-bottom: 8px; }
h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--primary); }
.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }

.stepper { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.step-dot { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; background: var(--border); color: var(--muted); font-weight: 600; }
.step-dot.active { background: var(--primary); color: #fff; }
.step-dot.done { background: var(--success); color: #fff; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 0.95rem; margin-bottom: 12px; }

.btn { padding: 8px 18px; border: none; border-radius: var(--radius); font-size: 0.9rem; cursor: pointer; font-weight: 600; transition: .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: .2s; }
.upload-zone:hover { border-color: var(--primary); background: #f0f4ff; }
.upload-zone input { display: none; }

table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th { text-align: left; padding: 8px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
td { padding: 8px; border-bottom: 1px solid var(--border); }
tr:hover { background: #f8fafc; }

.json-view { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: var(--radius); font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.8rem; max-height: 300px; overflow: auto; white-space: pre-wrap; }

.review-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.review-row .step-info { flex: 1; }
.review-row select { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }

.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
.badge-success { background: #dcfce7; color: #166534; }
.badge-warn { background: #fef9c3; color: #854d0e; }
.badge-error { background: #fee2e2; color: #991b1b; }

.toast { position: fixed; top: 16px; right: 16px; padding: 12px 20px; border-radius: var(--radius); color: #fff; font-weight: 600; z-index: 999; animation: fadeIn .3s; }
.toast.error { background: var(--danger); }
.toast.success { background: var(--success); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>激光传感器装配指导系统</h1>
  <p class="subtitle">STEP CAD → 产品结构图 → 装配流程 → 工程师审核 → PDF 指导书</p>

  <div class="stepper">
    <span class="step-dot" id="s1">1. 上传 STEP 文件</span>
    <span class="step-dot" id="s2">2. 查看产品结构</span>
    <span class="step-dot" id="s3">3. 生成装配流程</span>
    <span class="step-dot" id="s4">4. 工程师审核</span>
    <span class="step-dot" id="s5">5. 导出 PDF 指导书</span>
  </div>

  <!-- 第1步：上传 -->
  <div class="card" id="card-upload">
    <h3>📁 上传 STEP 文件</h3>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <p>点击此处选择 .step 文件，或直接拖拽文件到此处</p>
      <p style="color:var(--muted);font-size:0.8rem;">支持格式：ISO 10303-21（AP203/AP214）</p>
      <input type="file" id="file-input" accept=".step,.stp" onchange="uploadFile()">
    </div>
    <div id="upload-status" style="margin-top:8px;"></div>
  </div>

  <!-- 第2步：产品结构 -->
  <div class="card" id="card-graph" style="display:none;">
    <h3>📊 产品结构图 <span id="pg-status" class="badge badge-success"></span></h3>
    <div id="pg-content"></div>
  </div>

  <!-- 第3步：生成流程 -->
  <div class="card" id="card-generate" style="display:none;">
    <h3>⚙️ 生成装配流程</h3>
    <button class="btn btn-primary" id="btn-generate" onclick="generateProcess()">生成草稿工艺流程</button>
    <div id="draft-content" style="margin-top:12px;"></div>
  </div>

  <!-- 第4步：审核 -->
  <div class="card" id="card-review" style="display:none;">
    <h3>✅ 工程师审核</h3>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px;">对每个步骤选择操作：接受、修改或删除，可选填理由</p>
    <div id="review-steps"></div>
    <div class="actions">
      <button class="btn btn-success" id="btn-submit" onclick="submitReview()">提交审核结果</button>
    </div>
    <div id="review-result" style="margin-top:12px;"></div>
  </div>

  <!-- 第5步：指导书与PDF -->
  <div class="card" id="card-instruction" style="display:none;">
    <h3>📄 装配指导书与 PDF 导出</h3>
    <button class="btn btn-primary" id="btn-render" onclick="renderInstruction()">渲染装配指导书</button>
    <button class="btn btn-success" id="btn-pdf" onclick="exportPdf()" style="display:none;">导出 PDF</button>
    <div id="instruction-content" style="margin-top:12px;"></div>
  </div>
</div>

<script>
const API = '/api/v1';
let state = { stepFileId: null, productGraphId: null, processId: null, steps: [], approvedId: null, instructionId: null };

function toast(msg, type='success') {
  const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}

function setStep(n) {
  for (let i=1; i<=5; i++) {
    const el = document.getElementById(`s${i}`);
    el.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
  }
}

// 第1步：上传 STEP 文件
async function uploadFile() {
  const file = document.getElementById('file-input').files[0];
  if (!file) return;
  const zone = document.getElementById('upload-zone');
  zone.innerHTML = '<div class="spinner"></div> 正在解析 STEP 文件...';

  const form = new FormData(); form.append('file', file);
  try {
    const r = await fetch(`${API}/step/analyze`, { method: 'POST', body: form });
    const data = await r.json();
    if (!data.success) { toast(data.error.message, 'error'); zone.innerHTML = '<p>点击此处选择 .step 文件，或直接拖拽文件到此处</p>'; return; }

    state.productGraphId = data.data.productGraphId;
    state.stepFileId = data.data.stepFileId;
    document.getElementById('upload-status').innerHTML = `<span class="badge badge-success">✅ 已解析：${file.name}</span>`;
    setStep(2);
    loadProductGraph();
  } catch(e) { toast('上传失败：' + e.message, 'error'); zone.innerHTML = '<p>点击此处选择 .step 文件，或直接拖拽文件到此处</p>'; }
}

// 第2步：查看产品结构
async function loadProductGraph() {
  try {
    const r = await fetch(`${API}/product-graphs/${state.productGraphId}`);
    const data = await r.json();
    const pg = data.data;
    document.getElementById('pg-status').textContent = `${pg.nodes.length} 个节点，${pg.edges.length} 条边`;

    // 构建节点 ID → 名称映射
    const nodeMap = {};
    pg.nodes.forEach(n => { nodeMap[n.nodeId] = { name: n.name, type: n.nodeType }; });

    // 关系类型中文映射
    const relMap = {
      'contains': '包含',
      'attached_to': '连接到',
      'fastened_by': '被紧固于'
    };

    document.getElementById('pg-content').innerHTML =
      `<details><summary>节点列表（${pg.nodes.length}）</summary><table><tr><th>类型</th><th>名称</th><th style="text-align:center;">数量</th></tr>` +
      pg.nodes.map(n => `<tr><td>${n.nodeType === 'assembly' ? '🔧 装配体' : '📦 零件'}</td><td>${n.name}</td><td style="text-align:center;">${n.quantity || 1}</td></tr>`).join('') + '</table></details>' +
      `<details style="margin-top:8px;"><summary>边列表（${pg.edges.length}）</summary><table><tr><th>源</th><th>关系</th><th>目标</th></tr>` +
      pg.edges.map(e => {
        const src = nodeMap[e.source] ? nodeMap[e.source].name : e.source.substring(0,8)+'...';
        const tgt = nodeMap[e.target] ? nodeMap[e.target].name : e.target.substring(0,8)+'...';
        return `<tr><td>${src}</td><td>${relMap[e.relation] || e.relation}</td><td>${tgt}</td></tr>`;
      }).join('') + '</table></details>';
    document.getElementById('card-graph').style.display = '';
    document.getElementById('card-generate').style.display = '';
    setStep(2);
  } catch(e) { toast('加载产品结构失败：' + e.message, 'error'); }
}

// 第3步：生成装配流程
async function generateProcess() {
  document.getElementById('btn-generate').disabled = true;
  document.getElementById('btn-generate').innerHTML = '<span class="spinner"></span> 正在生成...';

  try {
    const r = await fetch(`${API}/process/generate`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({productGraphId: state.productGraphId})
    });
    const data = await r.json();
    if (!data.success) { toast(data.error.message, 'error'); return; }

    state.processId = data.data.processId;
    state.steps = data.data.steps;
    document.getElementById('draft-content').innerHTML =
      `<p>状态：<span class="badge badge-warn">${data.data.status === 'reviewing' ? '待审核' : data.data.status}</span> — 共 ${state.steps.length} 个步骤</p>` +
      `<table><tr><th>序号</th><th>标题</th><th>描述</th></tr>` +
      state.steps.map(s => `<tr><td>${s.sequence}</td><td>${s.title}</td><td>${s.description}</td></tr>`).join('') + '</table>';
    document.getElementById('card-review').style.display = '';
    buildReviewUI();
    setStep(3);
  } catch(e) { toast('生成失败：' + e.message, 'error'); }
  finally { document.getElementById('btn-generate').disabled = false; document.getElementById('btn-generate').textContent = '生成草稿工艺流程'; }
}

// 第4步：审核界面
function buildReviewUI() {
  document.getElementById('review-steps').innerHTML = state.steps.map(s => `
    <div class="review-row">
      <span style="font-weight:600;">${s.sequence}.</span>
      <div class="step-info"><strong>${s.title}</strong><br><small style="color:var(--muted)">${s.description}</small></div>
      <select id="action-${s.stepId}">
        <option value="accept">接受</option>
        <option value="modify">修改</option>
        <option value="delete">删除</option>
      </select>
      <input id="reason-${s.stepId}" placeholder="理由（选填）" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;width:150px;">
    </div>
  `).join('');
  setStep(4);
}

async function submitReview() {
  const decisions = state.steps.map(s => ({
    stepId: s.stepId,
    action: document.getElementById(`action-${s.stepId}`).value,
    reason: document.getElementById(`reason-${s.stepId}`).value || '同意'
  }));

  try {
    const r = await fetch(`${API}/process/review`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({processId: state.processId, decisions})
    });
    const data = await r.json();
    if (!data.success) { toast(data.error.message, 'error'); return; }

    state.approvedId = data.data.approvedProcessId;
    document.getElementById('review-result').innerHTML =
      `<span class="badge badge-success">✅ 已批准：${state.approvedId}</span>`;
    document.getElementById('card-instruction').style.display = '';
    setStep(5);
  } catch(e) { toast('审核失败：' + e.message, 'error'); }
}

// 第5步：渲染指导书
async function renderInstruction() {
  document.getElementById('btn-render').disabled = true;
  document.getElementById('btn-render').innerHTML = '<span class="spinner"></span> 正在渲染...';

  try {
    const r = await fetch(`${API}/instruction/render`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({approvedProcessId: state.approvedId})
    });
    const data = await r.json();
    if (!data.success) { toast(data.error.message, 'error'); return; }

    state.instructionId = data.data.instructionId;

    const r2 = await fetch(`${API}/instruction/${state.instructionId}`);
    const d2 = await r2.json();
    const sections = d2.data.sections;

    const typeNames = { cover: '封面', overview: '概述', step: '步骤', safety: '安全须知', ending: '尾页' };
    const typeStyles = { cover: 'badge-warn', overview: 'badge-warn', step: 'badge-success', safety: 'badge-error', ending: 'badge-warn' };

    document.getElementById('instruction-content').innerHTML =
      `<p>指导书 ID：<code>${state.instructionId}</code></p>` +
      `<table><tr><th>类型</th><th>内容</th></tr>` +
      sections.map(s => `<tr><td><span class="badge ${typeStyles[s.sectionType] || 'badge-warn'}">${typeNames[s.sectionType] || s.sectionType}</span></td><td style="white-space:pre-wrap;">${s.content.substring(0,100)}${s.content.length>100?'...':''}${s.imagePath?' 📷 有图':''}</td></tr>`).join('') + '</table>';

    document.getElementById('btn-pdf').style.display = '';
    toast('指导书渲染成功');
  } catch(e) { toast('渲染失败：' + e.message, 'error'); }
  finally { document.getElementById('btn-render').disabled = false; document.getElementById('btn-render').textContent = '渲染装配指导书'; }
}

// 导出 PDF
async function exportPdf() {
  document.getElementById('btn-pdf').disabled = true;
  document.getElementById('btn-pdf').innerHTML = '<span class="spinner"></span> 正在导出...';

  try {
    const r = await fetch(`${API}/instruction/export-pdf`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({instructionId: state.instructionId})
    });
    const data = await r.json();
    if (!data.success) { toast(data.error.message, 'error'); return; }

    document.getElementById('instruction-content').innerHTML +=
      `<p style="margin-top:8px;"><span class="badge badge-success">✅ PDF 已导出：</span> <code>${data.data.pdfPath}</code></p>`;
    toast('PDF 导出成功：' + data.data.pdfPath);
  } catch(e) { toast('PDF 导出失败：' + e.message, 'error'); }
  finally { document.getElementById('btn-pdf').disabled = false; document.getElementById('btn-pdf').textContent = '导出 PDF'; }
}

// 拖拽上传
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--primary)'; });
zone.addEventListener('dragleave', () => zone.style.borderColor = 'var(--border)');
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.style.borderColor = 'var(--border)';
  document.getElementById('file-input').files = e.dataTransfer.files;
  uploadFile();
});
</script>
</body>
</html>
